# ConfigMap for Auth Microservice

apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
  namespace: auth-service
  labels:
    app.kubernetes.io/name:      auth-microservice
    app.kubernetes.io/component: config
data:
  PORT:            "3000"
  NODE_ENV:        "production"
  JWT_EXPIRES_IN:  "1h"
  SERVICE_NAME:    "auth-microservice"
  SERVICE_VERSION: "1.0.0"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://alloy.monitoring.svc.cluster.local:4317"
  LOKI_HOST:                   "http://loki.monitoring.svc.cluster.local:3100"